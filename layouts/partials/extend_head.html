<style>
  @font-face {
    font-family: 'TsangerJinKai';
    src: url('/fonts/仓耳今楷04-W03.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  body {
    font-family: 'TsangerJinKai', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
  }

  /* Exclude MathJax from custom font */
  mjx-container, mjx-math, mjx-mrow {
    font-family: MJXZERO, MJXTEX !important;
  }

  /* Widen the content area */
  .main {
    max-width: 1200px !important;
  }
  .post-content {
    max-width: 900px !important;
  }

  /* Increase font size by one level */
  html {
    font-size: 20px;
  }
  .post-content p,
  .post-content li {
    font-size: 1.1rem;
  }
  .post-content h1 {
    font-size: 2.2rem;
  }
  .post-content h2 {
    font-size: 1.8rem;
  }
  .post-content h3 {
    font-size: 1.5rem;
  }

  /* Center images */
  .post-content img {
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  /* Bold figure captions */
  .post-content img + p em {
    font-weight: bold;
    font-style: normal;
  }
</style>

{{ if .Params.math }}
<script>
MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true,
    processEnvironments: true,
    tags: {{ if .Params.mathTags }}'ams'{{ else }}'none'{{ end }}
  },
  options: {
    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
  }
};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{{ end }}
