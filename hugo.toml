baseURL = 'https://warden2018.github.io/'
languageCode = 'zh-cn'
defaultContentLanguage = "zh"
title = "Yang's Blog"
theme = "PaperMod"

[pagination]
  pagerSize = 10

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = true
  UseHugoToc = true
  mainSections = ["posts"]

  [params.homeInfoParams]
    Title = "Yang's Blog"
    Content = "记录学习与生活"

  [params.assets]
    favicon = "favicon-32x32.png"
    favicon16x16 = "favicon-16x16.png"
    favicon32x32 = "favicon-32x32.png"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/warden2018"

[params.editPost]
  URL = "https://github.com/warden2018/blog"
  Text = "Suggest Changes"
  appendFilePath = true

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"

[services]
  [services.rss]
    limit = 42
