name: Deploy Hugo blog to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: read

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.158.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass --classic

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f package.json ]] && npm ci || true"

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --gc \
            --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4
        with:
          repository: warden2018/warden2018.github.io
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          git-config:
            user.name: github-actions[bot]
            user.email: github-actions[bot]@users.noreply.github.com
          fetch-depth: 0
          clean: true

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: ${{ github.workspace }}/dist

      - name: Push to GitHub Pages repo
        run: |
          cp -r ${{ github.workspace }}/dist/* .
          rm -rf .github
          git add -A
          git diff --cached --quiet && echo "No changes to publish" && exit 0
          git commit -m "Deploy blog: ${{ github.sha }}"
          git push origin main
